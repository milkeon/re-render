<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>re:render</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(8, 12, 22, 0.88);
      --panel-soft: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: #aab8d5;
      --accent: #ffffff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(116, 160, 255, 0.20), transparent 26%),
        radial-gradient(circle at 82% 84%, rgba(144, 92, 255, 0.14), transparent 28%),
        linear-gradient(180deg, #040714, #02040a 72%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas.main {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .brand-wrap {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 30;
      width: min(82vw, 780px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(9, 14, 28, 0.88), rgba(7, 10, 18, 0.82));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      pointer-events: auto;
    }

    .source-button {
      width: min(100%, 420px);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 15px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
      cursor: pointer;
      font: inherit;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .source-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.11);
    }
    .source-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .source-button .current {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .source-button .chev { opacity: 0.9; font-size: 18px; }

    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .menu {
      display: none;
      width: min(100%, 420px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      background: rgba(6, 8, 14, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .menu.open { display: block; }
    .menu-empty {
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .option {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 74px 1fr 18px;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      text-align: left;
      transition: background .12s ease;
    }
    .option:first-child { border-top: none; }
    .option:hover { background: rgba(255,255,255,0.08); }
    .option.active { background: rgba(125, 164, 255, 0.18); }
    .option .thumb {
      width: 74px;
      height: 42px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .option .info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .option .info strong {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .option .info small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .option .chev {
      justify-self: end;
      color: rgba(255,255,255,0.7);
      font-weight: 700;
    }

    .minimap-shell {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      width: min(360px, calc(100vw - 36px));
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(13, 18, 34, 0.94), rgba(6, 8, 15, 0.94));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    canvas.minimap {
      display: block;
      width: 100%;
      height: 198px;
      background: #05070f;
      touch-action: none;
      cursor: grab;
    }
    canvas.minimap.dragging { cursor: grabbing; }

    .status {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 18;
      max-width: min(48vw, 640px);
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(8, 12, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.84);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }

    .empty-state .card {
      max-width: 680px;
      padding: 24px 28px;
      border-radius: 24px;
      background: rgba(8, 12, 22, 0.55);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
    }

    .empty-state h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.06em;
    }

    .empty-state p {
      margin: 0;
      color: rgba(170, 184, 213, 0.95);
      font-size: 16px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .brand-wrap { top: 10px; left: 10px; width: calc(100vw - 20px); }
      .source-button, .menu { width: 100%; }
      .minimap-shell { right: 10px; bottom: 10px; width: calc(100vw - 20px); }
      .status { left: 10px; bottom: 10px; max-width: calc(100vw - 20px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="mainCanvas" class="main" aria-label="re-render screen"></canvas>

    <div class="brand-wrap">
      <div class="brand">re:render</div>
      <div class="controls">
        <button id="sourceButton" class="source-button" aria-expanded="false" aria-controls="sourceMenu">
          <span>
            <span class="current" id="currentSourceName">실행 중 창을 선택하세요</span>
          </span>
          <span class="chev">▾</span>
        </button>
        <div class="meta">
          <span id="currentSourceMeta">실제 실행 중 창 목록만 표시</span>
        </div>
        <div id="sourceMenu" class="menu" role="listbox" aria-label="running programs"></div>
      </div>
    </div>

    <aside class="minimap-shell" aria-label="mini map">
      <canvas id="miniCanvas" class="minimap" width="720" height="396"></canvas>
    </aside>

    <div id="statusLine" class="status">실행 중 창을 불러오는 중…</div>

    <div id="emptyState" class="empty-state">
      <div class="card">
        <h1>실행 중 창을 선택하면<br />여기에서 크게 다시 보여줍니다</h1>
        <p>
          왼쪽 상단 버튼으로 실제 창을 고르고,
          오른쪽 아래 미니맵에서 클릭+드래그로 보고 싶은 영역을 다시 잡아주세요.
        </p>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
