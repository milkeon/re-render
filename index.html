<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>re:render — 화면 선택 뷰어</title>
  <style>
    :root {
      --bg: #0a1020;
      --panel: rgba(12, 18, 35, 0.88);
      --panel-2: rgba(18, 26, 47, 0.94);
      --text: #f4f7ff;
      --muted: #9badca;
      --line: rgba(255,255,255,0.11);
      --accent: #8fc9ff;
      --accent-2: #6fa6ff;
      --shadow: 0 18px 55px rgba(0,0,0,0.38);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111,166,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(143,201,255,0.12), transparent 34%),
        linear-gradient(180deg, #08101d, #050916 60%, #02040a);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .hero {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 20;
      width: min(80vw, 760px);
      padding: 18px 18px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), rgba(8, 12, 24, 0.90));
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(143, 201, 255, 0.12);
      color: #dcecff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.58;
      max-width: 60ch;
    }

    .selector-row {
      margin-top: 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .pick-btn {
      width: min(80%, 420px);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
      font: inherit;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .pick-btn:hover { transform: translateY(-1px); border-color: rgba(143,201,255,0.36); background: rgba(255,255,255,0.11); }
    .pick-btn:active { transform: translateY(0); }
    .pick-btn .label {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }
    .pick-btn .small { font-size: 12px; color: var(--muted); }
    .pick-btn .current { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
    .chev { color: #d9eaff; font-size: 18px; opacity: 0.9; }

    .menu {
      display: none;
      width: min(80%, 420px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(7, 10, 18, 0.96);
      box-shadow: var(--shadow);
    }
    .menu.open { display: block; }

    .menu-header {
      padding: 12px 14px;
      font-size: 12px;
      color: #9fb3d6;
      letter-spacing: .03em;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .option {
      padding: 13px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      transition: background .12s ease;
      user-select: none;
    }
    .option:first-of-type { border-top: none; }
    .option:hover { background: rgba(143,201,255,0.10); }
    .option.active { background: rgba(111,166,255,0.18); }
    .option .name { font-weight: 700; }
    .option .desc { font-size: 12px; color: var(--muted); }

    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: stretch;
    }

    canvas.main {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .minimap-card {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 18;
      width: min(320px, calc(100vw - 36px));
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(15,21,38,0.96), rgba(8,12,22,0.94));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .minimap-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 13px;
      font-size: 12px;
      color: #9db0cf;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .minimap-head strong { color: var(--text); }

    canvas.minimap {
      display: block;
      width: 100%;
      height: 170px;
      background: #050811;
      border-top: 1px solid rgba(255,255,255,0.03);
      cursor: grab;
      touch-action: none;
    }
    canvas.minimap.dragging { cursor: grabbing; }

    .foot {
      padding: 10px 13px 13px;
      color: #91a4c8;
      font-size: 12px;
      line-height: 1.45;
    }

    .status {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      color: #dce7fb;
      font-size: 13px;
    }
    .status span { color: var(--muted); }
    .status strong { font-weight: 800; color: #f8fbff; }

    @media (max-width: 700px) {
      .hero { left: 10px; top: 10px; width: calc(100vw - 20px); }
      .minimap-card { right: 10px; bottom: 10px; width: calc(100vw - 20px); }
      .pick-btn, .menu { width: 100%; }
      .status { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage">
      <canvas id="mainCanvas" class="main" aria-label="Main re-rendered screen"></canvas>
    </div>

    <section class="hero" aria-label="Project header">
      <div class="eyebrow">re:render · concept MVP</div>
      <h1>선택한 화면 / 프로그램을 크게 다시 보여주는 뷰어</h1>
      <p class="sub">
        하나의 선택 버튼으로 보여줄 대상을 고르고, 미니맵에서 현재 보고 있는 영역을 다시 잡는 단순한 구조입니다.
        복잡한 버튼은 없애고, 바로 고르는 흐름에 집중했습니다.
      </p>

      <div class="selector-row">
        <button id="sourceButton" class="pick-btn" aria-expanded="false" aria-controls="sourceMenu">
          <span class="label">
            <span class="small">보여줄 화면 / 프로그램</span>
            <span class="current" id="currentSourceName">브라우저 창</span>
          </span>
          <span class="chev">▾</span>
        </button>

        <div id="sourceMenu" class="menu" role="listbox" aria-label="화면 프로그램 선택">
          <div class="menu-header">어떤 대상을 보여줄지 선택</div>
        </div>
      </div>

      <div class="status" id="status"></div>
    </section>

    <aside class="minimap-card" aria-label="Mini map">
      <div class="minimap-head">
        <strong>미니맵</strong>
        <span>드래그로 영역 재지정</span>
      </div>
      <canvas id="miniCanvas" class="minimap" width="640" height="360"></canvas>
      <div class="foot">
        흰색 박스가 현재 메인 뷰가 보고 있는 영역입니다. 선택한 대상에 따라 미니맵 색감과 메인 화면 내용이 바뀝니다.
      </div>
    </aside>

    <canvas id="worldCanvas" width="1920" height="1080" hidden></canvas>
  </div>

  <script>
    (() => {
      const WORLD_W = 1920;
      const WORLD_H = 1080;
      const SOURCE_PRESETS = [
        { id: 'browser', name: '브라우저 창', short: 'Browser', desc: '문서 / 웹사이트 / 대시보드', tone: ['#111827', '#1d4ed8', '#60a5fa'] },
        { id: 'editor', name: '코드 편집기', short: 'Editor', desc: '작은 글씨 / IDE / 로그', tone: ['#0b1220', '#8b5cf6', '#a78bfa'] },
        { id: 'video', name: '영상 프로그램', short: 'Video', desc: '재생기 / 타임라인 / 자막', tone: ['#111111', '#ef4444', '#f59e0b'] },
        { id: 'presentation', name: '프레젠테이션', short: 'Deck', desc: '슬라이드 / 발표 화면', tone: ['#0f172a', '#10b981', '#34d399'] },
        { id: 'chat', name: '채팅 / 메신저', short: 'Chat', desc: '대화 / 알림 / 작은 패널', tone: ['#0c1420', '#f97316', '#fb7185'] },
      ];

      const mainCanvas = document.getElementById('mainCanvas');
      const miniCanvas = document.getElementById('miniCanvas');
      const worldCanvas = document.getElementById('worldCanvas');
      const sourceButton = document.getElementById('sourceButton');
      const sourceMenu = document.getElementById('sourceMenu');
      const currentSourceName = document.getElementById('currentSourceName');
      const status = document.getElementById('status');

      const mainCtx = mainCanvas.getContext('2d');
      const miniCtx = miniCanvas.getContext('2d');
      const worldCtx = worldCanvas.getContext('2d');

      const state = {
        source: SOURCE_PRESETS[0],
        centerX: WORLD_W * 0.5,
        centerY: WORLD_H * 0.5,
        zoom: 1.8,
        dpr: window.devicePixelRatio || 1,
        t: 0,
      };

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

      function getViewport() {
        const w = WORLD_W / state.zoom;
        const h = WORLD_H / state.zoom;
        return {
          x: clamp(state.centerX - w / 2, 0, WORLD_W - w),
          y: clamp(state.centerY - h / 2, 0, WORLD_H - h),
          w,
          h,
        };
      }

      function resize(canvas, ctx) {
        const rect = canvas.getBoundingClientRect();
        const w = Math.max(1, Math.floor(rect.width * state.dpr));
        const h = Math.max(1, Math.floor(rect.height * state.dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function buildMenu() {
        SOURCE_PRESETS.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'option';
          row.setAttribute('role', 'option');
          row.dataset.id = item.id;
          row.innerHTML = `
            <div>
              <div class="name">${item.name}</div>
              <div class="desc">${item.desc}</div>
            </div>
            <div style="color:#bfd3ff;font-size:12px;font-weight:700;">${item.short}</div>
          `;
          row.addEventListener('click', () => selectSource(item.id));
          sourceMenu.appendChild(row);
        });
      }

      function selectSource(id) {
        state.source = SOURCE_PRESETS.find((x) => x.id === id) || SOURCE_PRESETS[0];
        currentSourceName.textContent = state.source.name;
        sourceButton.setAttribute('aria-expanded', 'false');
        sourceMenu.classList.remove('open');
        updateMenuHighlight();
        updateStatus();
      }

      function updateMenuHighlight() {
        [...sourceMenu.querySelectorAll('.option')].forEach((el) => {
          el.classList.toggle('active', el.dataset.id === state.source.id);
        });
      }

      function updateStatus() {
        const vp = getViewport();
        status.innerHTML = `
          <div><span>대상:</span> <strong>${state.source.name}</strong></div>
          <div><span>모드:</span> <strong>Manual</strong></div>
          <div><span>Viewport:</span> <strong>${Math.round(vp.x)}, ${Math.round(vp.y)} → ${Math.round(vp.w)}×${Math.round(vp.h)}</strong></div>
          <div><span>Center:</span> <strong>${Math.round(state.centerX)}, ${Math.round(state.centerY)}</strong></div>
        `;
        window.__rerenderState = {
          source: state.source,
          viewport: vp,
          centerX: state.centerX,
          centerY: state.centerY,
          zoom: state.zoom,
        };
      }

      function setSourceMoodColors(ctx, x, y, w, h, colors) {
        const grad = ctx.createLinearGradient(x, y, x + w, y + h);
        grad.addColorStop(0, colors[0]);
        grad.addColorStop(0.5, colors[1]);
        grad.addColorStop(1, colors[2]);
        return grad;
      }

      function drawWorld(ctx, time) {
        const s = state.source;
        ctx.clearRect(0, 0, WORLD_W, WORLD_H);
        ctx.fillStyle = setSourceMoodColors(ctx, 0, 0, WORLD_W, WORLD_H, s.tone);
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.strokeStyle = '#d9e9ff';
        for (let x = 0; x <= WORLD_W; x += 120) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H); ctx.stroke();
        }
        for (let y = 0; y <= WORLD_H; y += 120) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y); ctx.stroke();
        }
        ctx.restore();

        const pulseX = WORLD_W * 0.5 + Math.sin(time * 0.001) * 250;
        const pulseY = WORLD_H * 0.35 + Math.cos(time * 0.0013) * 110;
        const glow = ctx.createRadialGradient(pulseX, pulseY, 18, pulseX, pulseY, 340);
        glow.addColorStop(0, 'rgba(255,255,255,0.38)');
        glow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        const panelX = 120;
        const panelY = 100;
        const panelW = 780;
        const panelH = 440;
        roundRect(ctx, panelX, panelY, panelW, panelH, 30, 'rgba(5, 9, 18, 0.72)', 'rgba(255,255,255,0.15)');

        ctx.fillStyle = '#f9fbff';
        ctx.font = '700 30px Inter, sans-serif';
        ctx.fillText(s.name, panelX + 26, panelY + 58);
        ctx.font = '500 18px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.84)';
        ctx.fillText(s.desc, panelX + 26, panelY + 93);

        if (s.id === 'browser') {
          drawBrowser(ctx, panelX + 20, panelY + 120, panelW - 40, panelH - 145, time);
        } else if (s.id === 'editor') {
          drawEditor(ctx, panelX + 20, panelY + 120, panelW - 40, panelH - 145, time);
        } else if (s.id === 'video') {
          drawVideo(ctx, panelX + 20, panelY + 120, panelW - 40, panelH - 145, time);
        } else if (s.id === 'presentation') {
          drawPresentation(ctx, panelX + 20, panelY + 120, panelW - 40, panelH - 145, time);
        } else {
          drawChat(ctx, panelX + 20, panelY + 120, panelW - 40, panelH - 145, time);
        }

        drawLowerCaption(ctx);
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
        ctx.restore();
      }

      function drawBrowser(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(255,255,255,0.05)', 'rgba(255,255,255,0.10)');
        roundRect(ctx, x + 18, y + 16, w - 36, 46, 14, 'rgba(255,255,255,0.08)', 'rgba(255,255,255,0.09)');
        ctx.fillStyle = '#eaf3ff';
        ctx.font = '600 16px Inter, sans-serif';
        ctx.fillText('웹사이트 / 대시보드 / 문서', x + 34, y + 45);
        for (let i = 0; i < 4; i++) {
          const bx = x + 24 + i * 180;
          roundRect(ctx, bx, y + 82, 150, 100, 18, 'rgba(143,201,255,0.13)', 'rgba(255,255,255,0.09)');
          ctx.fillStyle = '#fff';
          ctx.font = '700 18px Inter, sans-serif';
          ctx.fillText(['뉴스피드', '통계', '리스트', '설정'][i], bx + 14, y + 116);
          ctx.fillStyle = 'rgba(234,243,255,0.82)';
          ctx.font = '14px Inter, sans-serif';
          ctx.fillText('작은 텍스트', bx + 14, y + 140);
        }
        drawWave(ctx, x + 28, y + h - 58, w - 56, 34, time, '#a7d8ff');
      }

      function drawEditor(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.30)', 'rgba(255,255,255,0.10)');
        ctx.fillStyle = '#d9e6ff';
        ctx.font = '600 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace';
        const lines = [
          'function render() {',
          '  const target = chooseSource();',
          '  const crop = getViewport(target);',
          '  drawReframe(crop);',
          '}',
          '',
          '// logs / variables / small text',
          'viewport => 411, 231 → 1097×617',
        ];
        lines.forEach((line, i) => ctx.fillText(line, x + 20, y + 30 + i * 28));
        ctx.fillStyle = 'rgba(143,201,255,0.14)';
        ctx.fillRect(x + w - 270, y + 24, 230, h - 48);
        ctx.fillStyle = '#ffffff';
        ctx.font = '700 18px Inter, sans-serif';
        ctx.fillText('IDE / 로그 패널', x + w - 250, y + 56);
        ctx.font = '14px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText('작은 글씨를 크게 보기', x + w - 250, y + 88);
        drawWave(ctx, x + 24, y + h - 50, w - 48, 30, time, '#c5b3ff');
      }

      function drawVideo(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.26)', 'rgba(255,255,255,0.10)');
        ctx.fillStyle = '#fff';
        ctx.font = '700 18px Inter, sans-serif';
        ctx.fillText('영상 재생 프로그램', x + 20, y + 34);
        const barsY = y + 70;
        for (let i = 0; i < 8; i++) {
          const bx = x + 24 + i * ((w - 80) / 8);
          const bh = 32 + Math.sin(time * 0.003 + i * 0.8) * 18;
          ctx.fillStyle = `rgba(255,255,255,${0.25 + i * 0.05})`;
          ctx.fillRect(bx, barsY + 60 - bh, 34, bh);
        }
        roundRect(ctx, x + 24, y + 142, w - 48, 86, 18, 'rgba(255,255,255,0.08)', 'rgba(255,255,255,0.06)');
        ctx.fillStyle = '#ffe9cc';
        ctx.font = '600 15px Inter, sans-serif';
        ctx.fillText('자막 / 타임라인 / 작은 재생 UI', x + 44, y + 175);
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText('작은 화면을 크게 다시 보여줄 때', x + 44, y + 202);
        drawWave(ctx, x + 24, y + h - 54, w - 48, 30, time, '#ffb15f');
      }

      function drawPresentation(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(255,255,255,0.04)', 'rgba(255,255,255,0.10)');
        roundRect(ctx, x + 28, y + 28, w - 56, h - 56, 20, 'rgba(16,185,129,0.14)', 'rgba(255,255,255,0.08)');
        ctx.fillStyle = '#fff';
        ctx.font = '700 28px Inter, sans-serif';
        ctx.fillText('슬라이드 04', x + 48, y + 74);
        ctx.font = '600 18px Inter, sans-serif';
        ctx.fillText('발표 화면 / 큰 제목 / 보조 텍스트', x + 48, y + 110);
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.font = '16px Inter, sans-serif';
        ctx.fillText('화면 전체를 다시 잡아 큰 글씨로 보는 용도', x + 48, y + 148);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + 48, y + 200);
        ctx.lineTo(x + w - 48, y + 200 + Math.sin(time * 0.002) * 20);
        ctx.stroke();
      }

      function drawChat(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.22)', 'rgba(255,255,255,0.10)');
        for (let i = 0; i < 4; i++) {
          const by = y + 18 + i * 66;
          roundRect(ctx, x + 18, by, w * 0.72, 48, 18, i % 2 ? 'rgba(255,255,255,0.08)' : 'rgba(143,201,255,0.10)', 'rgba(255,255,255,0.06)');
          ctx.fillStyle = '#ffffff';
          ctx.font = '600 14px Inter, sans-serif';
          ctx.fillText(['사용자', '메시지', '알림', '상태'][i], x + 34, by + 20);
          ctx.fillStyle = 'rgba(255,255,255,0.78)';
          ctx.fillText('작은 채팅 / 패널 / 카드', x + 34, by + 38);
        }
        roundRect(ctx, x + w - 260, y + 24, 230, h - 48, 20, 'rgba(249,115,22,0.16)', 'rgba(255,255,255,0.07)');
        ctx.fillStyle = '#fff';
        ctx.font = '700 18px Inter, sans-serif';
        ctx.fillText('메신저 패널', x + w - 236, y + 58);
        ctx.font = '14px Inter, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.fillText('작은 글씨를 크게 보기', x + w - 236, y + 86);
        drawWave(ctx, x + 18, y + h - 54, w - 36, 30, time, '#ff8f70');
      }

      function drawWave(ctx, x, y, w, h, time, color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i <= w; i += 8) {
          const px = x + i;
          const py = y + h / 2 + Math.sin(i * 0.03 + time * 0.004) * 8 + Math.cos(i * 0.017 + time * 0.003) * 4;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawLowerCaption(ctx) {
        ctx.save();
        const x = 120;
        const y = 880;
        roundRect(ctx, x, y, 680, 100, 22, 'rgba(7,10,17,0.55)', 'rgba(255,255,255,0.10)');
        ctx.fillStyle = '#f6faff';
        ctx.font = '700 20px Inter, sans-serif';
        ctx.fillText('선택한 화면을 크게 다시 보여줍니다', x + 20, y + 36);
        ctx.fillStyle = 'rgba(245,250,255,0.80)';
        ctx.font = '14px Inter, sans-serif';
        ctx.fillText('왼쪽 상단 버튼으로 프로그램/화면을 선택하면, 화면2가 그 대상을 기준으로 다시 렌더링합니다.', x + 20, y + 62);
        ctx.restore();
      }

      function drawMiniMap() {
        resize(miniCanvas, miniCtx);
        const rect = miniCanvas.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        miniCtx.clearRect(0, 0, w, h);
        miniCtx.drawImage(worldCanvas, 0, 0, WORLD_W, WORLD_H, 0, 0, w, h);

        const vp = getViewport();
        const sx = (vp.x / WORLD_W) * w;
        const sy = (vp.y / WORLD_H) * h;
        const sw = (vp.w / WORLD_W) * w;
        const sh = (vp.h / WORLD_H) * h;

        miniCtx.save();
        miniCtx.fillStyle = 'rgba(0,0,0,0.25)';
        miniCtx.fillRect(0, 0, w, h);
        miniCtx.clearRect(sx, sy, sw, sh);
        miniCtx.drawImage(worldCanvas, 0, 0, WORLD_W, WORLD_H, 0, 0, w, h);
        miniCtx.fillStyle = 'rgba(0,0,0,0.20)';
        miniCtx.fillRect(0, 0, w, h);
        miniCtx.clearRect(sx, sy, sw, sh);
        miniCtx.strokeStyle = '#ffffff';
        miniCtx.lineWidth = 4;
        miniCtx.shadowColor = 'rgba(255,255,255,0.6)';
        miniCtx.shadowBlur = 14;
        miniCtx.strokeRect(sx + 2, sy + 2, sw - 4, sh - 4);
        miniCtx.shadowBlur = 0;
        miniCtx.restore();
      }

      function drawMain() {
        resize(mainCanvas, mainCtx);
        const rect = mainCanvas.getBoundingClientRect();
        const vp = getViewport();
        mainCtx.clearRect(0, 0, rect.width, rect.height);
        mainCtx.drawImage(worldCanvas, vp.x, vp.y, vp.w, vp.h, 0, 0, rect.width, rect.height);
        const overlay = mainCtx.createLinearGradient(0, 0, 0, rect.height);
        overlay.addColorStop(0, 'rgba(0,0,0,0.06)');
        overlay.addColorStop(1, 'rgba(0,0,0,0.22)');
        mainCtx.fillStyle = overlay;
        mainCtx.fillRect(0, 0, rect.width, rect.height);
      }

      function pointerToWorld(canvas, ev) {
        const rect = canvas.getBoundingClientRect();
        const x = clamp((ev.clientX - rect.left) / rect.width * WORLD_W, 0, WORLD_W);
        const y = clamp((ev.clientY - rect.top) / rect.height * WORLD_H, 0, WORLD_H);
        return { x, y };
      }

      let dragging = false;
      miniCanvas.addEventListener('pointerdown', (ev) => {
        dragging = true;
        miniCanvas.classList.add('dragging');
        miniCanvas.setPointerCapture(ev.pointerId);
        const p = pointerToWorld(miniCanvas, ev);
        state.centerX = p.x;
        state.centerY = p.y;
        updateStatus();
      });
      miniCanvas.addEventListener('pointermove', (ev) => {
        if (!dragging) return;
        const p = pointerToWorld(miniCanvas, ev);
        state.centerX = p.x;
        state.centerY = p.y;
        updateStatus();
      });
      const endDrag = () => { dragging = false; miniCanvas.classList.remove('dragging'); };
      miniCanvas.addEventListener('pointerup', endDrag);
      miniCanvas.addEventListener('pointercancel', endDrag);
      miniCanvas.addEventListener('pointerleave', endDrag);

      sourceButton.addEventListener('click', () => {
        const open = sourceMenu.classList.toggle('open');
        sourceButton.setAttribute('aria-expanded', String(open));
      });

      document.addEventListener('click', (ev) => {
        if (!sourceButton.contains(ev.target) && !sourceMenu.contains(ev.target)) {
          sourceMenu.classList.remove('open');
          sourceButton.setAttribute('aria-expanded', 'false');
        }
      });

      document.addEventListener('keydown', (ev) => {
        const vp = getViewport();
        const stepX = Math.max(14, vp.w * 0.03);
        const stepY = Math.max(14, vp.h * 0.03);
        let handled = true;
        switch (ev.key) {
          case 'ArrowLeft': state.centerX -= stepX; break;
          case 'ArrowRight': state.centerX += stepX; break;
          case 'ArrowUp': state.centerY -= stepY; break;
          case 'ArrowDown': state.centerY += stepY; break;
          case '+':
          case '=': state.zoom = clamp(state.zoom + 0.1, 1.1, 4); break;
          case '-':
          case '_': state.zoom = clamp(state.zoom - 0.1, 1.1, 4); break;
          case 'Escape': sourceMenu.classList.remove('open'); sourceButton.setAttribute('aria-expanded', 'false'); break;
          default: handled = false;
        }
        if (handled && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(ev.key)) {
          state.centerX = clamp(state.centerX, vp.w / 2, WORLD_W - vp.w / 2);
          state.centerY = clamp(state.centerY, vp.h / 2, WORLD_H - vp.h / 2);
        }
        if (handled) {
          updateStatus();
          ev.preventDefault();
        }
      });

      function loop(time) {
        state.t = time;
        drawWorld(worldCtx, time);
        drawMain();
        drawMiniMap();
        updateStatus();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', () => {
        state.dpr = window.devicePixelRatio || 1;
      });

      buildMenu();
      selectSource('browser');
      updateMenuHighlight();
      state.centerX = WORLD_W * 0.5;
      state.centerY = WORLD_H * 0.5;
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
