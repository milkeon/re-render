<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>re:render</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(10, 14, 26, 0.74);
      --panel-2: rgba(8, 10, 18, 0.88);
      --line: rgba(255, 255, 255, 0.11);
      --text: #f5f7ff;
      --muted: #9eb0cf;
      --accent: #ffffff;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.4);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(116, 160, 255, 0.20), transparent 26%),
        radial-gradient(circle at 82% 84%, rgba(144, 92, 255, 0.14), transparent 28%),
        linear-gradient(180deg, #040714, #02040a 72%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas.main {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .brand-wrap {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 30;
      width: min(80vw, 760px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(9, 14, 28, 0.88), rgba(7, 10, 18, 0.82));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      pointer-events: auto;
    }

    .source-button {
      width: min(80%, 420px);
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 15px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
      cursor: pointer;
      font: inherit;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .source-button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.11);
    }
    .source-button:active { transform: translateY(0); }
    .source-button .current {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .source-button .chev { opacity: 0.9; font-size: 18px; }

    .menu {
      display: none;
      width: min(80%, 420px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      background: rgba(6, 8, 14, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .menu.open { display: block; }

    .option {
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      user-select: none;
      transition: background .12s ease;
    }
    .option:first-child { border-top: none; }
    .option:hover { background: rgba(255,255,255,0.08); }
    .option.active { background: rgba(125, 164, 255, 0.18); }
    .option .name {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .option .kind {
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }

    .minimap-shell {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      width: min(320px, calc(100vw - 36px));
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(13, 18, 34, 0.94), rgba(6, 8, 15, 0.94));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    canvas.minimap {
      display: block;
      width: 100%;
      height: 178px;
      background: #05070f;
      touch-action: none;
      cursor: grab;
    }
    canvas.minimap.dragging { cursor: grabbing; }

    @media (max-width: 700px) {
      .brand-wrap { top: 10px; left: 10px; width: calc(100vw - 20px); }
      .source-button, .menu { width: 100%; }
      .minimap-shell { right: 10px; bottom: 10px; width: calc(100vw - 20px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <canvas id="mainCanvas" class="main" aria-label="re-render screen"></canvas>

    <div class="brand-wrap">
      <div class="brand">re:render</div>
      <div class="controls">
        <button id="sourceButton" class="source-button" aria-expanded="false" aria-controls="sourceMenu">
          <span class="current" id="currentSourceName">로딩 중</span>
          <span class="chev">▾</span>
        </button>
        <div id="sourceMenu" class="menu" role="listbox" aria-label="running programs"></div>
      </div>
    </div>

    <aside class="minimap-shell" aria-label="mini map">
      <canvas id="miniCanvas" class="minimap" width="640" height="360"></canvas>
    </aside>

    <canvas id="worldCanvas" width="1920" height="1080" hidden></canvas>
  </div>

  <script>
    (() => {
      const WORLD_W = 1920;
      const WORLD_H = 1080;
      const FALLBACK_SOURCES = [
        { id: 'browser', name: 'Chrome', kind: 'browser', colors: ['#0f172a', '#2563eb', '#7dd3fc'] },
        { id: 'editor', name: 'VS Code', kind: 'editor', colors: ['#090c18', '#7c3aed', '#c4b5fd'] },
        { id: 'video', name: 'Video', kind: 'video', colors: ['#111111', '#f97316', '#facc15'] },
        { id: 'chat', name: 'Discord', kind: 'chat', colors: ['#0e1220', '#8b5cf6', '#fb7185'] },
        { id: 'presentation', name: 'Deck', kind: 'presentation', colors: ['#0a1220', '#10b981', '#5eead4'] },
      ];

      const mainCanvas = document.getElementById('mainCanvas');
      const miniCanvas = document.getElementById('miniCanvas');
      const worldCanvas = document.getElementById('worldCanvas');
      const sourceButton = document.getElementById('sourceButton');
      const sourceMenu = document.getElementById('sourceMenu');
      const currentSourceName = document.getElementById('currentSourceName');

      const mainCtx = mainCanvas.getContext('2d');
      const miniCtx = miniCanvas.getContext('2d');
      const worldCtx = worldCanvas.getContext('2d');

      const state = {
        sources: [],
        source: FALLBACK_SOURCES[0],
        centerX: WORLD_W * 0.5,
        centerY: WORLD_H * 0.5,
        zoom: 1.8,
        dpr: window.devicePixelRatio || 1,
        t: 0,
      };

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      function normalizeSource(source, index = 0) {
        const fallback = FALLBACK_SOURCES[index % FALLBACK_SOURCES.length];
        const colors = Array.isArray(source.colors) && source.colors.length >= 3 ? source.colors.slice(0, 3) : fallback.colors;
        const name = String(source.name || source.title || source.appName || source.windowTitle || fallback.name).trim() || fallback.name;
        return {
          id: String(source.id || source.windowId || source.handle || `${fallback.id}-${index}`),
          name,
          kind: String(source.kind || source.type || fallback.kind),
          colors,
          active: source.active !== false,
        };
      }

      async function loadSources() {
        try {
          const native = window.__rerenderNative;
          if (native && typeof native.listRunningWindows === 'function') {
            const result = await native.listRunningWindows();
            if (Array.isArray(result) && result.length) {
              return result.filter(Boolean).map((item, index) => normalizeSource(item, index));
            }
          }
        } catch (err) {
          console.warn('native source list failed', err);
        }
        return FALLBACK_SOURCES.map((item, index) => normalizeSource(item, index));
      }

      function resize(canvas, ctx) {
        const rect = canvas.getBoundingClientRect();
        const w = Math.max(1, Math.floor(rect.width * state.dpr));
        const h = Math.max(1, Math.floor(rect.height * state.dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function clampViewport() {
        const vp = getViewport();
        state.centerX = clamp(state.centerX, vp.w / 2, WORLD_W - vp.w / 2);
        state.centerY = clamp(state.centerY, vp.h / 2, WORLD_H - vp.h / 2);
      }

      function getViewport() {
        const w = WORLD_W / state.zoom;
        const h = WORLD_H / state.zoom;
        return {
          x: clamp(state.centerX - w / 2, 0, WORLD_W - w),
          y: clamp(state.centerY - h / 2, 0, WORLD_H - h),
          w,
          h,
        };
      }

      function setSource(sourceId) {
        const match = state.sources.find((item) => item.id === sourceId) || state.sources[0] || FALLBACK_SOURCES[0];
        state.source = match;
        currentSourceName.textContent = match.name;
        updateMenuHighlight();
        if (match.kind === 'browser') state.zoom = 1.8;
        if (match.kind === 'editor') state.zoom = 2.2;
        if (match.kind === 'video') state.zoom = 1.4;
        if (match.kind === 'chat') state.zoom = 2.0;
        if (match.kind === 'presentation') state.zoom = 1.3;
        state.centerX = WORLD_W * 0.5;
        state.centerY = WORLD_H * 0.5;
        window.__rerenderState = {
          source: state.source,
          viewport: getViewport(),
          centerX: state.centerX,
          centerY: state.centerY,
          zoom: state.zoom,
        };
      }

      function buildMenu() {
        sourceMenu.innerHTML = '';
        state.sources.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'option';
          row.dataset.id = item.id;
          row.setAttribute('role', 'option');
          row.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;min-width:0;">
              <span class="dot" style="background: linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]});"></span>
              <div style="min-width:0;">
                <div class="name">${escapeHtml(item.name)}</div>
              </div>
            </div>
            <div style="color:rgba(255,255,255,0.72);font-size:12px;font-weight:700;">●</div>
          `;
          row.addEventListener('click', () => {
            setSource(item.id);
            sourceMenu.classList.remove('open');
            sourceButton.setAttribute('aria-expanded', 'false');
          });
          sourceMenu.appendChild(row);
        });
      }

      function updateMenuHighlight() {
        [...sourceMenu.querySelectorAll('.option')].forEach((el) => {
          el.classList.toggle('active', el.dataset.id === state.source.id);
        });
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
        ctx.restore();
      }

      function gradient(ctx, x, y, w, h, colors) {
        const g = ctx.createLinearGradient(x, y, x + w, y + h);
        g.addColorStop(0, colors[0]);
        g.addColorStop(0.5, colors[1]);
        g.addColorStop(1, colors[2]);
        return g;
      }

      function drawWorld(ctx, time) {
        const s = state.source;
        ctx.clearRect(0, 0, WORLD_W, WORLD_H);
        ctx.fillStyle = gradient(ctx, 0, 0, WORLD_W, WORLD_H, s.colors);
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        ctx.save();
        ctx.globalAlpha = 0.10;
        ctx.strokeStyle = '#d6e5ff';
        for (let x = 0; x <= WORLD_W; x += 120) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H); ctx.stroke();
        }
        for (let y = 0; y <= WORLD_H; y += 120) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y); ctx.stroke();
        }
        ctx.restore();

        const pulseX = WORLD_W * 0.48 + Math.sin(time * 0.001) * 220;
        const pulseY = WORLD_H * 0.36 + Math.cos(time * 0.00125) * 120;
        const glow = ctx.createRadialGradient(pulseX, pulseY, 20, pulseX, pulseY, 360);
        glow.addColorStop(0, 'rgba(255,255,255,0.34)');
        glow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        const shellX = 120;
        const shellY = 96;
        const shellW = 780;
        const shellH = 460;
        roundRect(ctx, shellX, shellY, shellW, shellH, 30, 'rgba(4, 8, 16, 0.56)', 'rgba(255,255,255,0.16)');

        if (s.kind === 'browser') drawBrowser(ctx, shellX + 18, shellY + 18, shellW - 36, shellH - 36, time, s);
        else if (s.kind === 'editor') drawEditor(ctx, shellX + 18, shellY + 18, shellW - 36, shellH - 36, time, s);
        else if (s.kind === 'video') drawVideo(ctx, shellX + 18, shellY + 18, shellW - 36, shellH - 36, time, s);
        else if (s.kind === 'chat') drawChat(ctx, shellX + 18, shellY + 18, shellW - 36, shellH - 36, time, s);
        else drawPresentation(ctx, shellX + 18, shellY + 18, shellW - 36, shellH - 36, time, s);
      }

      function drawBrowser(ctx, x, y, w, h, time, s) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(255,255,255,0.06)', 'rgba(255,255,255,0.10)');
        roundRect(ctx, x + 18, y + 16, w - 36, 46, 14, 'rgba(255,255,255,0.10)', 'rgba(255,255,255,0.10)');
        for (let i = 0; i < 3; i++) {
          ctx.fillStyle = ['#ff5f57', '#febc2e', '#28c840'][i];
          ctx.beginPath();
          ctx.arc(x + 38 + i * 18, y + 39, 6, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.fillRect(x + 28, y + 84, w - 56, 30);
        ctx.fillRect(x + 28, y + 126, w - 56, 132);
        for (let i = 0; i < 4; i++) {
          const bx = x + 32 + i * ((w - 80) / 4);
          roundRect(ctx, bx, y + 280, 160, 110, 18, 'rgba(255,255,255,0.09)', 'rgba(255,255,255,0.08)');
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillRect(bx + 16, y + 300, 128, 14);
          ctx.fillRect(bx + 16, y + 324, 90, 12);
          ctx.fillRect(bx + 16, y + 350, 108, 10);
        }
        drawWave(ctx, x + 28, y + h - 58, w - 56, 30, time, '#a7d8ff');
      }

      function drawEditor(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.30)', 'rgba(255,255,255,0.10)');
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(x + 18, y + 18, 90, h - 36);
        ctx.fillRect(x + 126, y + 18, w - 270, 38);
        ctx.fillRect(x + 126, y + 68, w - 270, h - 104);
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        for (let i = 0; i < 12; i++) {
          ctx.fillRect(x + 144, y + 96 + i * 24, 200 + (i % 3) * 88, 8);
        }
        ctx.fillStyle = 'rgba(126, 87, 255, 0.24)';
        ctx.fillRect(x + w - 120, y + 18, 102, h - 36);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        for (let i = 0; i < 8; i++) {
          ctx.fillRect(x + w - 102, y + 50 + i * 38, 60 + (i % 2) * 18, 10);
        }
        drawWave(ctx, x + 24, y + h - 52, w - 48, 28, time, '#c5b3ff');
      }

      function drawVideo(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.26)', 'rgba(255,255,255,0.10)');
        roundRect(ctx, x + 24, y + 20, w - 48, h - 120, 18, 'rgba(255,255,255,0.08)', 'rgba(255,255,255,0.08)');
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.beginPath();
        ctx.moveTo(x + 56, y + 56);
        ctx.lineTo(x + 56, y + h - 164);
        ctx.lineTo(x + w - 76, y + h - 110);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(x + 24, y + h - 88, w - 48, 24);
        for (let i = 0; i < 8; i++) {
          const bx = x + 32 + i * ((w - 64) / 8);
          const bh = 18 + Math.sin(time * 0.004 + i * 0.72) * 22;
          ctx.fillStyle = `rgba(255,255,255,${0.20 + i * 0.04})`;
          ctx.fillRect(bx, y + h - 46 - bh, 26, bh);
        }
      }

      function drawChat(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(0,0,0,0.22)', 'rgba(255,255,255,0.10)');
        for (let i = 0; i < 4; i++) {
          const by = y + 24 + i * 74;
          roundRect(ctx, x + 20, by, w * 0.72, 48, 18, i % 2 ? 'rgba(255,255,255,0.08)' : 'rgba(143,201,255,0.12)', 'rgba(255,255,255,0.06)');
          if (i % 2) {
            roundRect(ctx, x + w - 250, by + 10, 210, 40, 18, 'rgba(255,255,255,0.10)', 'rgba(255,255,255,0.06)');
          }
        }
        roundRect(ctx, x + w - 264, y + 28, 238, h - 56, 20, 'rgba(249,115,22,0.16)', 'rgba(255,255,255,0.08)');
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(x + w - 236, y + 58, 166, 14);
        ctx.fillRect(x + w - 236, y + 90, 130, 10);
        ctx.fillRect(x + w - 236, y + 118, 152, 10);
        ctx.fillRect(x + w - 236, y + 146, 110, 10);
        drawWave(ctx, x + 18, y + h - 52, w - 36, 28, time, '#ff8f70');
      }

      function drawPresentation(ctx, x, y, w, h, time) {
        roundRect(ctx, x, y, w, h, 24, 'rgba(255,255,255,0.04)', 'rgba(255,255,255,0.10)');
        roundRect(ctx, x + 30, y + 28, w - 60, h - 56, 20, 'rgba(16,185,129,0.14)', 'rgba(255,255,255,0.08)');
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(x + 58, y + 66, w - 116, 26);
        ctx.fillRect(x + 58, y + 110, w * 0.52, 18);
        ctx.fillRect(x + 58, y + 146, w * 0.38, 12);
        ctx.strokeStyle = 'rgba(255,255,255,0.20)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(x + 60, y + 212);
        ctx.lineTo(x + w - 60, y + 212 + Math.sin(time * 0.002) * 20);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(x + 58, y + 250, w - 116, 28);
        ctx.fillRect(x + 58, y + 292, w * 0.66, 16);
      }

      function drawWave(ctx, x, y, w, h, time, color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i <= w; i += 8) {
          const px = x + i;
          const py = y + h / 2 + Math.sin(i * 0.03 + time * 0.004) * 8 + Math.cos(i * 0.017 + time * 0.003) * 4;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawMiniMap() {
        resize(miniCanvas, miniCtx);
        const rect = miniCanvas.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        miniCtx.clearRect(0, 0, w, h);
        miniCtx.drawImage(worldCanvas, 0, 0, WORLD_W, WORLD_H, 0, 0, w, h);

        const vp = getViewport();
        const sx = (vp.x / WORLD_W) * w;
        const sy = (vp.y / WORLD_H) * h;
        const sw = (vp.w / WORLD_W) * w;
        const sh = (vp.h / WORLD_H) * h;

        miniCtx.save();
        miniCtx.fillStyle = 'rgba(0,0,0,0.22)';
        miniCtx.fillRect(0, 0, w, h);
        miniCtx.clearRect(sx, sy, sw, sh);
        miniCtx.drawImage(worldCanvas, 0, 0, WORLD_W, WORLD_H, 0, 0, w, h);
        miniCtx.fillStyle = 'rgba(0,0,0,0.18)';
        miniCtx.fillRect(0, 0, w, h);
        miniCtx.clearRect(sx, sy, sw, sh);
        miniCtx.strokeStyle = '#ffffff';
        miniCtx.lineWidth = 4;
        miniCtx.shadowColor = 'rgba(255,255,255,0.6)';
        miniCtx.shadowBlur = 14;
        miniCtx.strokeRect(sx + 2, sy + 2, sw - 4, sh - 4);
        miniCtx.shadowBlur = 0;
        miniCtx.restore();
      }

      function drawMain() {
        resize(mainCanvas, mainCtx);
        const rect = mainCanvas.getBoundingClientRect();
        const vp = getViewport();
        mainCtx.clearRect(0, 0, rect.width, rect.height);
        mainCtx.drawImage(worldCanvas, vp.x, vp.y, vp.w, vp.h, 0, 0, rect.width, rect.height);
        const overlay = mainCtx.createLinearGradient(0, 0, 0, rect.height);
        overlay.addColorStop(0, 'rgba(0,0,0,0.04)');
        overlay.addColorStop(1, 'rgba(0,0,0,0.18)');
        mainCtx.fillStyle = overlay;
        mainCtx.fillRect(0, 0, rect.width, rect.height);
      }

      function pointerToWorld(canvas, ev) {
        const rect = canvas.getBoundingClientRect();
        const x = clamp(((ev.clientX - rect.left) / rect.width) * WORLD_W, 0, WORLD_W);
        const y = clamp(((ev.clientY - rect.top) / rect.height) * WORLD_H, 0, WORLD_H);
        return { x, y };
      }

      let dragging = false;
      let pointerId = null;

      miniCanvas.addEventListener('pointerdown', (ev) => {
        dragging = true;
        pointerId = ev.pointerId;
        miniCanvas.classList.add('dragging');
        miniCanvas.setPointerCapture(ev.pointerId);
        const p = pointerToWorld(miniCanvas, ev);
        state.centerX = p.x;
        state.centerY = p.y;
      });
      miniCanvas.addEventListener('pointermove', (ev) => {
        if (!dragging || pointerId !== ev.pointerId) return;
        const p = pointerToWorld(miniCanvas, ev);
        state.centerX = p.x;
        state.centerY = p.y;
      });
      function endDrag(ev) {
        if (pointerId !== null && ev && ev.pointerId !== pointerId) return;
        dragging = false;
        pointerId = null;
        miniCanvas.classList.remove('dragging');
      }
      miniCanvas.addEventListener('pointerup', endDrag);
      miniCanvas.addEventListener('pointercancel', endDrag);
      miniCanvas.addEventListener('pointerleave', endDrag);

      sourceButton.addEventListener('click', () => {
        const open = sourceMenu.classList.toggle('open');
        sourceButton.setAttribute('aria-expanded', String(open));
      });

      document.addEventListener('click', (ev) => {
        if (!sourceButton.contains(ev.target) && !sourceMenu.contains(ev.target)) {
          sourceMenu.classList.remove('open');
          sourceButton.setAttribute('aria-expanded', 'false');
        }
      });

      document.addEventListener('keydown', (ev) => {
        const vp = getViewport();
        const stepX = Math.max(14, vp.w * 0.03);
        const stepY = Math.max(14, vp.h * 0.03);
        let handled = true;

        switch (ev.key) {
          case 'ArrowLeft': state.centerX -= stepX; break;
          case 'ArrowRight': state.centerX += stepX; break;
          case 'ArrowUp': state.centerY -= stepY; break;
          case 'ArrowDown': state.centerY += stepY; break;
          case '+':
          case '=': state.zoom = clamp(state.zoom + 0.1, 1.1, 4); break;
          case '-':
          case '_': state.zoom = clamp(state.zoom - 0.1, 1.1, 4); break;
          case 'Escape':
            sourceMenu.classList.remove('open');
            sourceButton.setAttribute('aria-expanded', 'false');
            break;
          default:
            handled = false;
        }

        if (handled && ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(ev.key)) {
          clampViewport();
        }
        if (handled) {
          ev.preventDefault();
        }
      });

      async function init() {
        state.sources = await loadSources();
        buildMenu();
        setSource(state.sources[0]?.id || FALLBACK_SOURCES[0].id);
        requestAnimationFrame(loop);
      }

      function loop(time) {
        state.t = time;
        drawWorld(worldCtx, time);
        drawMain();
        drawMiniMap();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', () => {
        state.dpr = window.devicePixelRatio || 1;
      });

      init();
    })();
  </script>
</body>
</html>
